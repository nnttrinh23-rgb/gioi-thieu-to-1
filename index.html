<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhóm 1</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background: linear-gradient(-45deg,#d4fc79,#b8f2e6,#c2ffd8,#f9f9f9);
background-size: 400% 400%;
animation: gradientMove 12s ease infinite;
overflow-x:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,0.9);
display:flex;
justify-content:center;
gap:40px;
padding:15px 0;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
z-index:1000;
}

nav a{
text-decoration:none;
font-weight:bold;
color:#2f5d50;
}

header{
text-align:center;
padding:140px 20px 60px;
}

header h1{
font-size:45px;
}

header p{
margin-top:15px;
font-size:20px;
opacity:0.8;
}

#about{
max-width:800px;
margin:0 auto 60px;
padding:30px;
text-align:center;
background:white;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.container{
max-width:1100px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.4s;
}

.card:hover{
transform: translateY(-10px) scale(1.05);
box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

.avatar{
width:110px;
height:110px;
object-fit:contain;
margin-bottom:10px;
}

.role{
font-size:14px;
opacity:0.7;
margin-top:5px;
}

.yen{color:#2ecc71;font-weight:bold;}
.trinh{color:#3498db;font-weight:bold;}
.an{color:#9b59b6;font-weight:bold;}

#achievements{
max-width:1000px;
margin:60px auto;
padding:40px;
background:white;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.achieve-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.achieve-item{
background:#f3fff6;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.achieve-item h4{
margin-bottom:10px;
color:#2ecc71;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:35px;
border-radius:25px;
text-align:center;
max-width:350px;
}

.petal{
position:fixed;
top:-20px;
width:15px;
height:20px;
background:pink;
border-radius:50% 50% 50% 0;
transform:rotate(45deg);
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

footer{
background:#2f5d50;
color:white;
text-align:center;
padding:25px;
margin-top:60px;
}
</style>
</head>
<body>
Nhi
<script>
function showQuote(name, quote){
    document.getElementById("name").innerText = name;
    document.getElementById("quote").innerText = quote;
    document.getElementById("popup").classList.add("active");
}

function closePopup(){
    document.getElementById("popup").classList.remove("active");
}

/* CÁNH HOA RƠI */
function createPetal(){
    const petal = document.createElement("div");
    petal.classList.add("petal");
    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(petal);

    setTimeout(() => {
        petal.remove();
    }, 10000);
}

setInterval(createPetal, 800);
</script>
